<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>学級掲示板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --border-color: #2d3436;
            --accent-red: #d63031;
            --font-size-date: 2.8rem;
            --font-size-title: 2.5rem;
            --font-size-input: 2.2rem;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: "BIZ UDPGothic", "Meiryo", sans-serif;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        #capture-area {
            background-color: var(--bg-color);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; background: #2d3436; color: white; height: 90px;
        }
        .date-container { display: flex; align-items: center; gap: 20px; }
        #date-display { font-size: var(--font-size-date); font-weight: bold; min-width: 420px; text-align: center; }
        .date-arrow { font-size: 2.5rem; cursor: pointer; background: none; border: none; color: white; padding: 10px; }

        .main-container {
            display: flex; flex: 1; padding: 15px; gap: 15px; box-sizing: border-box;
        }

        .left-panel { flex: 1.6; display: flex; flex-direction: column; background: white; border: 5px solid var(--border-color); border-radius: 15px; }
        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 15px; }

        .section { background: white; border: 5px solid var(--border-color); border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .section-header { background: #636e72; color: white; padding: 10px; font-size: var(--font-size-title); font-weight: bold; text-align: center; }

        .timetable-body { flex: 1; display: flex; flex-direction: column; justify-content: space-around; padding: 5px 15px; }
        .row { display: flex; align-items: center; gap: 10px; height: 15%; }
        .period-num { font-size: 2.8rem; font-weight: bold; width: 55px; text-align: center; }

        .sub-box { flex: 0.6; height: 100%; position: relative; }
        .content-ipt { flex: 1.4; }

        select, .other-ipt, .content-ipt, textarea {
            font-size: var(--font-size-input); 
            padding: 8px 12px; 
            border: 3px solid #b2bec3; 
            border-radius: 10px; 
            font-weight: bold; 
            box-sizing: border-box; 
            height: 100%; width: 100%; 
            background: white; color: black; 
            line-height: 1.3;
            font-family: inherit;
        }
        textarea { resize: none; overflow: hidden; white-space: pre-wrap; }

        /* コピー用ダミー要素 */
        .copy-dummy {
            font-size: var(--font-size-input);
            padding: 10px 14px;
            border: 3px solid #b2bec3;
            border-radius: 10px;
            font-weight: bold;
            box-sizing: border-box;
            background: white; color: black;
            line-height: 1.3;
            white-space: pre-wrap;
            word-break: break-all;
            display: flex;
            align-items: center;
            height: 100%;
            width: 100%;
        }

        .reset-mini-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); cursor: pointer; border: none; background: #eee; border-radius: 5px; padding: 5px 10px; z-index: 5; }

        .controls { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
        .btn { padding: 15px 25px; font-size: 1.1rem; cursor: pointer; border-radius: 30px; border: none; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn-fullscreen { background: #00b894; color: white; }
        .btn-slide { background: #fbbc04; color: #333; }
        .btn-reset { background: #636e72; color: white; }

        .hide-ui { visibility: visible; }
    </style>
</head>
<body>

<div id="capture-area">
    <div class="header-bar">
        <div class="date-container">
            <button class="date-arrow hide-ui" onclick="changeDate(-1)">◀</button>
            <div id="date-display"></div>
            <button class="date-arrow hide-ui" onclick="changeDate(1)">▶</button>
        </div>
        <div style="font-size: 1.5rem; color: #b2bec3;">本日のご連絡</div>
    </div>

    <div class="main-container">
        <section class="section left-panel">
            <div class="section-header">明日の時間割</div>
            <div class="timetable-body" id="timetable-list"></div>
        </section>

        <div class="right-panel">
            <section class="section" style="flex: 1;">
                <div class="section-header">宿題・持ち物</div>
                <textarea id="data-homework" oninput="saveData()"></textarea>
            </section>
            <section class="section" style="flex: 1;">
                <div class="section-header" style="background:var(--accent-red)">重要連絡、未提出</div>
                <textarea id="data-alert" style="color:var(--accent-red)" oninput="saveData()"></textarea>
            </section>
        </div>
    </div>
</div>

<div class="controls hide-ui">
    <button class="btn btn-reset" onclick="resetAll()">全リセット</button>
    <button class="btn btn-fullscreen" onclick="toggleFullscreen()">全画面表示</button>
    <button class="btn btn-slide" id="copy-btn" onclick="copyWholeScreen()">スライド用にコピー</button>
</div>

<script>
    const subjects = ["", "国語", "算数", "理科", "社会", "音楽", "図工", "家庭", "体育", "道徳", "外国語", "総合", "学活", "その他"];
    let currentDate = new Date();

    function updateDateDisplay() {
        const y = currentDate.getFullYear();
        const m = currentDate.getMonth() + 1;
        const d = currentDate.getDate();
        const w = ["日", "月", "火", "水", "木", "金", "土"][currentDate.getDay()];
        document.getElementById('date-display').innerText = `${y}年${m}月${d}日 (${w})`;
        loadData();
    }

    function changeDate(diff) {
        currentDate.setDate(currentDate.getDate() + diff);
        updateDateDisplay();
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }

    document.addEventListener('fullscreenchange', () => {
        const uis = document.querySelectorAll('.hide-ui');
        const isFull = !!document.fullscreenElement;
        uis.forEach(el => el.style.visibility = isFull ? 'hidden' : 'visible');
    });

    const list = document.getElementById('timetable-list');
    for(let i=1; i<=6; i++) {
        list.innerHTML += `
            <div class="row">
                <div class="period-num">${i}</div>
                <div class="sub-box" id="sub-box-${i}">
                    <select id="sel-${i}" onchange="checkOtherSubject(${i})">
                        ${subjects.map(s => `<option value="${s}">${s}</option>`).join('')}
                    </select>
                    <div id="other-wrap-${i}" style="display:none; width:100%; height:100%;">
                        <input type="text" id="ipt-${i}" class="other-ipt" oninput="saveData()">
                        <button class="reset-mini-btn hide-ui" onclick="resetSubject(${i})">↺</button>
                    </div>
                </div>
                <input type="text" id="cnt-${i}" class="content-ipt" oninput="saveData()">
            </div>
        `;
    }

    function checkOtherSubject(id) {
        const sel = document.getElementById(`sel-${id}`);
        if(sel.value === "その他") {
            sel.style.display = "none";
            document.getElementById(`other-wrap-${id}`).style.display = "block";
            document.getElementById(`ipt-${id}`).focus();
        }
        saveData();
    }

    function resetSubject(id) {
        const sel = document.getElementById(`sel-${id}`);
        sel.value = "";
        sel.style.display = "block";
        document.getElementById(`other-wrap-${id}`).style.display = "none";
        document.getElementById(`ipt-${id}`).value = "";
        saveData();
    }

    async function copyWholeScreen() {
        const btn = document.getElementById('copy-btn');
        btn.innerText = "作成中...";
        const hideElements = document.querySelectorAll('.hide-ui');
        hideElements.forEach(el => el.style.visibility = 'hidden');

        const area = document.getElementById('capture-area');

        try {
            const canvas = await html2canvas(area, {
                scale: 2,
                useCORS: true,
                backgroundColor: "#f8fafc",
                onclone: (clonedDoc) => {
                    // 全ての入力要素をループ
                    const inputs = clonedDoc.querySelectorAll('textarea, input[type="text"], select');
                    inputs.forEach(el => {
                        const original = document.getElementById(el.id);
                        if (!original) return;

                        // 画面上で非表示になっている要素（その他選択時のselectなど）は削除してスペースを空ける
                        if (window.getComputedStyle(original).display === 'none') {
                            el.remove();
                            return;
                        }

                        // 表示されているものだけをdiv化
                        const dummy = clonedDoc.createElement('div');
                        dummy.className = "copy-dummy";
                        dummy.innerText = original.value;
                        
                        // レイアウト維持のためのスタイル継承
                        const style = window.getComputedStyle(original);
                        dummy.style.flex = style.flex;
                        dummy.style.width = style.width;
                        if(el.tagName === "TEXTAREA") dummy.style.alignItems = "flex-start";
                        if(el.id.includes('data-alert')) dummy.style.color = "var(--accent-red)";
                        
                        el.parentNode.replaceChild(dummy, el);
                    });
                }
            });
            
            canvas.toBlob(async (blob) => {
                const item = new ClipboardItem({ "image/png": blob });
                await navigator.clipboard.write([item]);
                alert("コピー完了！そのままスライドへ Ctrl+V してください。");
                hideElements.forEach(el => el.style.visibility = 'visible');
                btn.innerText = "スライド用にコピー";
            });
        } catch (err) {
            console.error(err);
            hideElements.forEach(el => el.style.visibility = 'visible');
            btn.innerText = "スライド用にコピー";
        }
    }

    function getStorageKey() { return 'board_' + currentDate.toISOString().split('T')[0]; }

    function saveData() {
        const tt = [];
        for(let i=1; i<=6; i++) {
            tt.push({
                sel: document.getElementById(`sel-${i}`).value,
                ipt: document.getElementById(`ipt-${i}`).value,
                isOther: document.getElementById(`sel-${i}`).style.display === "none",
                cnt: document.getElementById(`cnt-${i}`).value
            });
        }
        const data = { hw: document.getElementById('data-homework').value, al: document.getElementById('data-alert').value, tt: tt };
        localStorage.setItem(getStorageKey(), JSON.stringify(data));
    }

    function loadData() {
        const saved = JSON.parse(localStorage.getItem(getStorageKey()));
        document.getElementById('data-homework').value = "";
        document.getElementById('data-alert').value = "";
        for(let i=1; i<=6; i++) {
            const sel = document.getElementById(`sel-${i}`);
            sel.value = "";
            sel.style.display = "block";
            document.getElementById(`other-wrap-${i}`).style.display = "none";
            document.getElementById(`ipt-${i}`).value = "";
            document.getElementById(`cnt-${i}`).value = "";
        }
        if(!saved) return;
        document.getElementById('data-homework').value = saved.hw;
        document.getElementById('data-alert').value = saved.al;
        saved.tt.forEach((t, i) => {
            const id = i+1;
            const sel = document.getElementById(`sel-${id}`);
            sel.value = t.sel;
            document.getElementById(`ipt-${id}`).value = t.ipt;
            document.getElementById(`cnt-${id}`).value = t.cnt;
            if(t.isOther) {
                sel.style.display = "none";
                document.getElementById(`other-wrap-${id}`).style.display = "block";
            }
        });
    }

    function resetAll() {
        if(confirm("データをリセットしますか？")) {
            localStorage.removeItem(getStorageKey());
            loadData();
        }
    }

    window.onload = updateDateDisplay;
</script>
</body>
</html>
